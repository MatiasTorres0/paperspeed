{% extends 'usuario/base.html' %}
{% block title %}Iniciar sesión - PaperSpeed{% endblock %}
{% block content %}
<div class="container mt-5" style="max-width: 420px;">
    <div class="card p-4">
        <h2 class="fw-bold mb-1">Bienvenido</h2>
        <p class="text-muted mb-4 small">Ingresa a tu cuenta</p>
        {% if messages %}
            {% for msg in messages %}
            <div class="alert alert-danger py-2 small">{{ msg }}</div>
            {% endfor %}
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label small fw-semibold">Usuario</label>
                <input type="text" name="username" class="form-control" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-semibold">Contraseña</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Ingresar</button>
        </form>
        <hr class="my-3" style="border-color: var(--ps-border);">
        <p class="text-center small text-muted mb-0">
            ¿No tienes cuenta? <a href="{% url 'registro' %}" class="text-primary">Regístrate</a>
        </p>
    </div>
</div>
{% endblock %}
